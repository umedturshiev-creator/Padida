<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Theatre Padida — Заявки</title>
  <meta name="theme-color" content="#6d28d9" />
  <style>
    :root{
      --bg:linear-gradient(180deg,#f8f6ff 0%,#eef2ff 100%);
      --card:#ffffffee;
      --text:#231942;
      --muted:#6b6680;
      --line:#e8defe;
      --primary:#6d28d9;
      --primary2:#9333ea;
      --danger:#dc2626;
      --warning:#f59e0b;
      --success:#16a34a;
      --shadow:0 16px 40px rgba(109,40,217,.10);
      --radius:22px;
      --today:#ffe7e7;
      --soon:#fff4d9;
      --future:#edf9f2;
      --cancel:#eff1f5;
      --soft:#f3ecff;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif}
    body{min-height:100vh}
    button,input,select,textarea{font:inherit}
    .hero{
      position:sticky;top:0;z-index:20;color:#fff;
      background:
        radial-gradient(circle at top left, rgba(236,72,153,.24), transparent 28%),
        radial-gradient(circle at top right, rgba(147,51,234,.20), transparent 30%),
        linear-gradient(135deg,#4c1d95 0%,#6d28d9 55%,#a21caf 100%);
      box-shadow:0 8px 28px rgba(76,29,149,.18);
      padding:12px 12px 14px
    }
    .hero-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .brand-wrap{display:flex;gap:10px;min-width:0;align-items:center}
    .logo-badge{
      width:48px;height:48px;border-radius:16px;background:rgba(255,255,255,.14);
      display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);
      overflow:hidden;border:1px solid rgba(255,255,255,.15);flex:0 0 auto
    }
    .logo-badge img{width:100%;height:100%;object-fit:cover}
    .brand h1{margin:0;font-size:21px;line-height:1.05}
    .brand p{margin:4px 0 0;font-size:12px;opacity:.95;line-height:1.35}
    .stats-bar{margin-top:10px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
    .stat-chip{
      background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.14);
      border-radius:16px;padding:8px 10px;min-width:0
    }
    .stat-chip span{display:block;font-size:10px;opacity:.88;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .stat-chip b{display:block;margin-top:4px;font-size:16px;line-height:1.1}
    .container{max-width:1120px;margin:0 auto;padding:12px}
    .search-wrap{padding-top:10px;padding-bottom:0}
    .layout{display:grid;grid-template-columns:360px 1fr;gap:12px;align-items:start}
    .panel{
      background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
      box-shadow:var(--shadow);padding:14px;backdrop-filter:blur(10px)
    }
    .panel h2{margin:0 0 10px;font-size:19px}
    .hint{margin:-2px 0 10px;font-size:12px;color:var(--muted);line-height:1.45}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .full{grid-column:1/-1}
    label{display:block;margin-bottom:6px;font-size:12px;font-weight:700}
    input,select,textarea{
      width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:14px;
      background:#fff;color:var(--text);outline:none
    }
    input:focus,select:focus,textarea:focus{border-color:#a78bfa;box-shadow:0 0 0 4px rgba(167,139,250,.14)}
    textarea{min-height:84px;resize:vertical}
    .search-panel{background:var(--soft);border-color:#d9c9ff;padding:10px 12px}
    .btn{
      width:100%;padding:11px 14px;font-size:14px;margin-top:8px;border:none;border-radius:14px;
      font-weight:700;cursor:pointer;transition:.15s ease
    }
    .btn:active{transform:scale(.98)}
    .btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff}
    .btn-secondary{background:#f3e8ff;color:var(--primary)}
    .btn-light{background:#f8fafc;color:var(--text)}
    .list{display:flex;flex-direction:column;gap:10px}
    .booking{position:relative;overflow:hidden;border-left:5px solid #c4b5fd}
    .booking::after{
      content:"";position:absolute;right:-34px;bottom:-34px;width:100px;height:100px;
      background:radial-gradient(circle, rgba(236,72,153,.08), transparent 70%);pointer-events:none
    }
    .booking.today{background:var(--today);border-left-color:var(--danger)}
    .booking.soon{background:var(--soon);border-left-color:var(--warning)}
    .booking.future{background:var(--future);border-left-color:var(--success)}
    .booking.cancelled{background:var(--cancel);border-left-color:#6b7280}
    .booking-head{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;margin-bottom:9px}
    .booking-title{font-size:18px;font-weight:800;margin-bottom:3px}
    .booking-sub{font-size:12px;color:var(--muted)}
    .badge{background:rgba(255,255,255,.86);border-radius:999px;padding:7px 11px;font-size:11px;font-weight:800;white-space:nowrap}
    .booking-meta{display:grid;grid-template-columns:repeat(2,1fr);gap:8px 10px;font-size:13px;line-height:1.45}
    .booking-meta div{background:rgba(255,255,255,.7);border-radius:12px;padding:9px 10px}
    .comment-box{margin-top:10px;background:rgba(255,255,255,.76);border-radius:14px;padding:11px;font-size:13px;line-height:1.45}
    .comment-title{font-weight:800;margin-bottom:5px}
    .actions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
    .empty{text-align:center;color:var(--muted);padding:24px 12px;font-size:14px}
    .error-box{
      margin-bottom:10px;padding:12px 14px;border-radius:14px;background:#fff1f2;
      color:#991b1b;border:1px solid #fecdd3;font-size:13px;line-height:1.45
    }
    .hidden{display:none!important}
    @media (max-width:900px){
      .layout{grid-template-columns:1fr}
      .actions,.booking-meta,.grid{grid-template-columns:1fr}
      .hero-top,.booking-head{flex-direction:column;align-items:stretch}
      .stats-bar{grid-template-columns:repeat(2,minmax(0,1fr))}
    }
    @media (max-width:640px){
      body{font-size:14px}
      .hero{padding:11px 10px 12px}
      .brand h1{font-size:19px}
      .brand p{font-size:11px}
      .logo-badge{width:44px;height:44px;border-radius:14px}
      .container{padding:10px}
      .panel{padding:12px;border-radius:18px}
      .panel h2{font-size:17px}
      input,select,textarea{font-size:16px;padding:11px}
      .btn{padding:11px 12px}
      .booking-title{font-size:16px}
      .booking-sub,.hint,.comment-box,.booking-meta{font-size:12px}
      .stats-bar{grid-template-columns:repeat(4,minmax(0,1fr));gap:6px}
      .stat-chip{padding:7px 8px;border-radius:14px}
      .stat-chip b{font-size:14px}
      .stat-chip span{font-size:9px}
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="hero-top">
      <div class="brand-wrap">
        <div class="logo-badge"><img src="icon-192.png" alt="Theatre Padida" /></div>
        <div class="brand">
          <h1>Theatre Padida</h1>
          <p>Заявки на выступления, синхронизация с Google Sheets<br><small>v2.0.0</small></p>
        </div>
      </div>
    </div>
    <div class="stats-bar">
      <div class="stat-chip"><span>Всего</span><b id="statTotal">0</b></div>
      <div class="stat-chip"><span>Активные</span><b id="statActive">0</b></div>
      <div class="stat-chip"><span>Сегодня/скоро</span><b id="statUrgent">0</b></div>
      <div class="stat-chip"><span>Отменённые</span><b id="statCancelled">0</b></div>
    </div>
  </header>

  <div class="container search-wrap">
    <div class="panel search-panel">
      <input id="searchInput" placeholder="Поиск по имени, телефону, месту или типу мероприятия" />
    </div>
  </div>

  <main class="container">
    <div class="layout">
      <section class="panel">
        <h2 id="formTitle">Новая заявка</h2>
        <div class="hint">Данные сохраняются напрямую в Google Sheets.</div>

        <div id="errorBox" class="error-box hidden"></div>

        <div class="grid">
          <div class="full">
            <label for="clientName">Имя заказчика</label>
            <input id="clientName" placeholder="Например: Ахмаджон" />
          </div>

          <div>
            <label for="phone">Телефон</label>
            <input id="phone" placeholder="937771669" inputmode="numeric" maxlength="9" />
          </div>

          <div>
            <label for="eventType">Тип мероприятия</label>
            <select id="eventType">
              <option>Свадьба</option>
              <option>Корпоратив</option>
              <option>Частный приём</option>
              <option>День рождения</option>
              <option>Другое</option>
            </select>
          </div>

          <div>
            <label for="eventDate">Дата выступления</label>
            <input id="eventDate" type="date" />
          </div>

          <div>
            <label for="eventTime">Время выступления</label>
            <input id="eventTime" type="time" />
          </div>

          <div class="full">
            <label for="location">Место проведения</label>
            <input id="location" placeholder="Например: Яккасарой" />
          </div>

          <div class="full">
            <label for="city">Город</label>
            <select id="city">
              <option value="">Выберите город</option>
              <option>Душанбе</option>
              <option>Худжанд</option>
              <option>Бохтар</option>
              <option>Куляб</option>
              <option>Турсунзаде</option>
              <option>Истаравшан</option>
              <option>Исфара</option>
              <option>Пенджикент</option>
              <option>Канибадам</option>
              <option>Вахдат</option>
              <option>Бустон</option>
              <option>Левакант</option>
              <option>Нурек</option>
              <option>Хорог</option>
              <option>Гиссар</option>
              <option>Рогун</option>
            </select>
          </div>

          <div class="full">
            <label for="comment">Комментарий</label>
            <textarea id="comment" placeholder="Например: 2 танца"></textarea>
          </div>
        </div>

        <button class="btn btn-primary" id="saveBtn">Сохранить заявку</button>
        <button class="btn btn-secondary hidden" id="cancelEditBtn">Отменить редактирование</button>
      </section>

      <section class="panel">
        <div id="bookingList" class="list"></div>

        <div id="cancelledSection" class="hidden" style="margin-top:18px">
          <h3 style="margin:2px 0 10px;font-size:17px">Отменённые заявки</h3>
          <div id="cancelledList" class="list"></div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwxe16KBxaXZI-MjOowxu4y_4ha_qSOI-2aZZ2Ltjq5VzbcU3qMlRl-W2tgkhfXvf5l/exec';

    let bookings = [];
    let editingId = null;

    const els = {
      clientName,
      phone,
      eventType,
      eventDate,
      eventTime,
      location,
      city,
      comment,
      saveBtn,
      cancelEditBtn,
      searchInput,
      bookingList,
      cancelledList,
      cancelledSection,
      formTitle,
      statTotal,
      statActive,
      statUrgent,
      statCancelled,
      errorBox
    };

    const normalizePhone = v => String(v || '').replace(/\D/g, '').slice(0, 9);
    const formatDate = d => !d ? '—' : new Intl.DateTimeFormat('ru-RU').format(new Date(d + 'T00:00:00'));
    const getEventDateTime = i => new Date(`${i.eventDate}T${i.eventTime || '00:00'}`);

    function showError(message) {
      if (!message) {
        els.errorBox.classList.add('hidden');
        els.errorBox.textContent = '';
        return;
      }
      els.errorBox.textContent = message;
      els.errorBox.classList.remove('hidden');
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    function validateForm() {
      const ok =
        els.clientName.value.trim() &&
        normalizePhone(els.phone.value).length === 9 &&
        els.eventDate.value &&
        els.eventTime.value &&
        els.location.value.trim();

      els.saveBtn.disabled = !ok;
    }

    function resetForm() {
      els.clientName.value = '';
      els.phone.value = '';
      els.eventType.value = 'Свадьба';
      els.eventDate.value = '';
      els.eventTime.value = '';
      els.location.value = '';
      els.city.value = '';
      els.comment.value = '';
      editingId = null;
      els.formTitle.textContent = 'Новая заявка';
      els.saveBtn.textContent = 'Сохранить заявку';
      els.cancelEditBtn.classList.add('hidden');
      showError('');
      validateForm();
    }

    function fillForm(item) {
      els.clientName.value = item.clientName || '';
      els.phone.value = item.phone || '';
      els.eventType.value = item.eventType || 'Свадьба';
      els.eventDate.value = item.eventDate || '';
      els.eventTime.value = item.eventTime || '';
      els.location.value = item.location || '';
      els.city.value = item.city || '';
      els.comment.value = item.comment || '';
      editingId = item.id;
      els.formTitle.textContent = 'Редактирование заявки';
      els.saveBtn.textContent = 'Сохранить изменения';
      els.cancelEditBtn.classList.remove('hidden');
      showError('');
      validateForm();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function isUrgent(item) {
      return item.status !== 'cancelled' && ((getEventDateTime(item) - new Date()) / (1000 * 60 * 60 * 24) <= 3);
    }

    function getCardClass(item) {
      if (item.status === 'cancelled') return 'cancelled';
      const diff = (getEventDateTime(item) - new Date()) / (1000 * 60 * 60 * 24);
      if (diff <= 1) return 'today';
      if (diff <= 3) return 'soon';
      return 'future';
    }

    function getBadgeText(item) {
      if (item.status === 'cancelled') return 'Отменён';
      const d = Math.ceil((getEventDateTime(item) - new Date()) / (1000 * 60 * 60 * 24));
      if (d <= 0) return 'Сегодня';
      if (d === 1) return 'Завтра';
      return `Через ${d} дн.`;
    }

    function renderStats(all) {
      els.statTotal.textContent = all.length;
      els.statActive.textContent = all.filter(x => x.status !== 'cancelled').length;
      els.statUrgent.textContent = all.filter(isUrgent).length;
      els.statCancelled.textContent = all.filter(x => x.status === 'cancelled').length;
    }

    function applyFilters(data) {
      const q = els.searchInput.value.trim().toLowerCase();
      let result = [...data];

      if (q) {
        result = result.filter(item =>
          [
            item.clientName,
            item.phone,
            item.location,
            item.city,
            item.eventType,
            item.comment
          ].join(' ').toLowerCase().includes(q)
        );
      }

      result.sort((a, b) => getEventDateTime(a) - getEventDateTime(b));
      return result;
    }

    function buildCard(item) {
      const actionButton = item.status === 'cancelled'
        ? `<button class="btn btn-secondary" onclick="restoreBooking('${item.id}')" style="margin-top:0">Вернуть</button>`
        : `<button class="btn btn-danger" onclick="setCancelled('${item.id}')" style="margin-top:0">Отменить</button>`;

      return `<article class="panel booking ${getCardClass(item)}">
        <div class="booking-head">
          <div>
            <div class="booking-title">${item.clientName || 'Без имени'}</div>
            <div class="booking-sub">${item.eventType || '—'} • ${item.city || 'Без города'}</div>
          </div>
          <div class="badge">${getBadgeText(item)}</div>
        </div>
        <div class="booking-meta">
          <div>📅 <b>Дата:</b><br>${formatDate(item.eventDate)}</div>
          <div>⏰ <b>Время:</b><br>${item.eventTime || '—'}</div>
          <div>📍 <b>Место:</b><br>${item.location || '—'}</div>
          <div>📞 <b>Телефон:</b><br>+992 ${item.phone || '—'}</div>
          <div>🏙 <b>Город:</b><br>${item.city || '—'}</div>
          <div>🗂 <b>Статус:</b><br>${item.status === 'cancelled' ? 'Отменён' : 'Активный'}</div>
        </div>
        <div class="comment-box">
          <div class="comment-title">Комментарий</div>
          ${item.comment || 'Комментарий пока не добавлен'}
        </div>
        <div class="actions">
          <button class="btn btn-light" onclick="editBooking('${item.id}')" style="margin-top:0">Редактировать</button>
          ${actionButton}
          <button class="btn btn-secondary" onclick="callClient('${item.phone || ''}')" style="margin-top:0">Позвонить</button>
        </div>
      </article>`;
    }

    function render() {
      const data = applyFilters(bookings);
      renderStats(bookings);

      const active = data.filter(x => x.status !== 'cancelled');
      const cancelled = data.filter(x => x.status === 'cancelled');

      els.bookingList.innerHTML = active.length
        ? active.map(buildCard).join('')
        : '<div class="panel empty">Активных заявок пока нет.</div>';

      els.cancelledSection.classList.toggle('hidden', cancelled.length === 0);
      els.cancelledList.innerHTML = cancelled.length
        ? cancelled.map(buildCard).join('')
        : '';
    }

    async function fetchBookings() {
      showError('');
      try {
        const res = await fetch(SCRIPT_URL + '?mode=list');
        const text = await res.text();

        let data;
        try {
          data = JSON.parse(text);
        } catch {
          throw new Error('Скрипт вернул не JSON');
        }

        if (!res.ok) {
          throw new Error('HTTP ошибка: ' + res.status);
        }

        if (data.ok === false) {
          throw new Error(data.error || 'Ошибка загрузки заявок');
        }

        bookings = Array.isArray(data.bookings) ? data.bookings : [];
        render();
      } catch (e) {
        console.error(e);
        bookings = [];
        render();
        showError('Не удалось загрузить заявки: ' + e.message);
      }
    }

    async function sendBooking(booking) {
      const payload = JSON.stringify({ booking });

      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: payload
      });

      const text = await res.text();

      let data;
      try {
        data = JSON.parse(text);
      } catch {
        throw new Error('Скрипт вернул не JSON: ' + text);
      }

      if (!res.ok) {
        throw new Error('HTTP ошибка: ' + res.status);
      }

      if (data.ok === false) {
        throw new Error(data.error || 'Ошибка сохранения');
      }

      return data;
    }

    async function saveBooking() {
      const old = bookings.find(x => x.id === editingId);

      const booking = {
        id: editingId || generateId(),
        clientName: els.clientName.value.trim(),
        phone: normalizePhone(els.phone.value),
        eventType: els.eventType.value,
        eventDate: els.eventDate.value,
        eventTime: els.eventTime.value,
        location: els.location.value.trim(),
        city: els.city.value.trim(),
        comment: els.comment.value.trim(),
        status: old?.status || 'active',
        createdAt: old?.createdAt || new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };

      try {
        showError('');
        els.saveBtn.disabled = true;
        await sendBooking(booking);
        resetForm();
        await fetchBookings();
      } catch (e) {
        console.error(e);
        showError('Не удалось сохранить заявку: ' + e.message);
      } finally {
        validateForm();
      }
    }

    async function setCancelled(id) {
      const item = bookings.find(x => x.id === id);
      if (!item) return;

      try {
        showError('');
        await sendBooking({ ...item, status: 'cancelled', updatedAt: new Date().toISOString() });
        await fetchBookings();
      } catch (e) {
        console.error(e);
        showError('Не удалось отменить заявку: ' + e.message);
      }
    }

    async function restoreBooking(id) {
      const item = bookings.find(x => x.id === id);
      if (!item) return;

      try {
        showError('');
        await sendBooking({ ...item, status: 'active', updatedAt: new Date().toISOString() });
        await fetchBookings();
      } catch (e) {
        console.error(e);
        showError('Не удалось вернуть заявку: ' + e.message);
      }
    }

    function editBooking(id) {
      const item = bookings.find(x => x.id === id);
      if (item) fillForm(item);
    }

    function callClient(phoneValue) {
      if (!phoneValue) return;
      window.location.href = `tel:+992${phoneValue}`;
    }

    window.editBooking = editBooking;
    window.callClient = callClient;
    window.setCancelled = setCancelled;
    window.restoreBooking = restoreBooking;

    [els.clientName, els.phone, els.eventDate, els.eventTime, els.location].forEach(el => {
      el.addEventListener('input', validateForm);
    });

    els.phone.addEventListener('input', () => {
      els.phone.value = normalizePhone(els.phone.value);
    });

    els.searchInput.addEventListener('input', render);
    els.saveBtn.addEventListener('click', saveBooking);
    els.cancelEditBtn.addEventListener('click', resetForm);

    validateForm();
    fetchBookings();
  </script>
</body>
</html>
